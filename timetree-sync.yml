name: TimeTree to LINE Sync

on:
  schedule:
    # 每 15 分鐘執行一次（GitHub Actions 使用 UTC 時間，這裡是每小時的 0,15,30,45 分）
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # 允許在 GitHub 網頁上手動點擊執行，方便測試

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: pip install timetree-exporter icalendar requests

      - name: 執行同步腳本
        env:
          TIMETREE_EMAIL: ${{ secrets.TIMETREE_EMAIL }}
          TIMETREE_PASSWORD: ${{ secrets.TIMETREE_PASSWORD }}
          TIMETREE_CALENDAR_CODE: ${{ secrets.TIMETREE_CALENDAR_CODE }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          TIMETREE_SYNC_SECRET: ${{ secrets.TIMETREE_SYNC_SECRET }}
        run: python timetree_sync_push.py
